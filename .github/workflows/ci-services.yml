name: CI - All Services (Matrix)

on:
  push:
    branches: [main, develop, staging]
    paths:
      - 'services/matchmaking-service/**'
      - 'services/leaderboard-service/**'
      - 'services/notification-service/**'
      - 'services/analytics-service/**'
  pull_request:
    branches: [main]

env:
  ACR_NAME: acrsequenceprod

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            matchmaking-service:
              - 'services/matchmaking-service/**'
            leaderboard-service:
              - 'services/leaderboard-service/**'
            notification-service:
              - 'services/notification-service/**'
            analytics-service:
              - 'services/analytics-service/**'

  build-scan-sign:
    name: Build → Scan → Sign (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    permissions:
      contents: write
      id-token: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: go test ./... -race

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: acrsequenceprod.azurecr.io/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=acrsequenceprod.azurecr.io/${{ matrix.service }}:cache
          cache-to: type=registry,ref=acrsequenceprod.azurecr.io/${{ matrix.service }}:cache,mode=max
          platforms: linux/amd64

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: acrsequenceprod.azurecr.io/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: ${{ github.ref == 'refs/heads/main' && '1' || '0' }}

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            acrsequenceprod.azurecr.io/${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - name: Update GitOps image tag
        if: github.ref == 'refs/heads/main'
        run: |
          cd kubernetes/overlays/prod
          kustomize edit set image \
            acrsequenceprod.azurecr.io/${{ matrix.service }}=acrsequenceprod.azurecr.io/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kustomization.yaml
          git commit -m "chore: update ${{ matrix.service }} image [skip ci]" || true
          git push
