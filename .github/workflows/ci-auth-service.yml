name: CI - Auth Service

on:
  push:
    branches: [main, develop, staging]
    paths:
      - 'services/auth-service/**'
      - '.github/workflows/ci-auth-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/auth-service/**'

env:
  SERVICE: auth-service
  ACR_NAME: acrsequenceprod
  IMAGE: acrsequenceprod.azurecr.io/auth-service

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/auth-service/go.sum

      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: services/auth-service/coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/auth-service
          version: latest

  build-scan-sign:
    name: Build → Scan → Sign
    runs-on: ubuntu-latest
    needs: [test, lint]
    permissions:
      contents: read
      id-token: write  # Required for Cosign keyless signing + Azure OIDC
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      # Generate Docker image tags (branch name, sha, semver)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Login to ACR using Workload Identity (no credentials in code)
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Multi-stage build: builder → distroless
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: services/auth-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache,mode=max
          platforms: linux/amd64

      # Generate SBOM (Software Bill of Materials)
      # Lists every package in the image — required for vulnerability tracking
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      # Trivy security scan — fails build on CRITICAL CVEs in production branches
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: ${{ github.ref == 'refs/heads/main' && '1' || '0' }}

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # Cosign keyless signing — signs with ephemeral cert tied to GitHub Actions OIDC
      # No key management required. Signature stored in ACR as OCI artifact.
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes \
            ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

      - name: Verify signature (sanity check)
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/Callmeanurag/Sequence/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

  update-gitops:
    name: Update GitOps Image Tag
    runs-on: ubuntu-latest
    needs: [build-scan-sign]
    if: github.ref == 'refs/heads/main'  # Only update prod on main branch merge
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in kustomization
        run: |
          cd kubernetes/overlays/prod
          # Update the image tag to the new digest for immutable reference
          kustomize edit set image \
            acrsequenceprod.azurecr.io/auth-service=${{ env.IMAGE }}@${{ needs.build-scan-sign.outputs.image-digest }}

      - name: Commit and push image tag update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/overlays/prod/kustomization.yaml
          git commit -m "chore: update auth-service image to ${{ needs.build-scan-sign.outputs.image-tag }}" || true
          git push
