apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service
  annotations:
    azure.workload.identity/client-id: ""  # Set via Kustomize overlay per environment
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
data:
  REDIS_HOST: "redis-sequence.redis.cache.windows.net"
  REDIS_PORT: "6380"
  REDIS_TLS: "true"
  JWT_ISSUER: "sequence-auth"
  JWT_ACCESS_TOKEN_TTL: "900"    # 15 minutes
  JWT_REFRESH_TOKEN_TTL: "604800" # 7 days
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: auth-service-secrets
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: ""  # Set via Kustomize overlay
    keyvaultName: ""  # Set via Kustomize overlay
    tenantId: ""  # Set via Kustomize overlay
    objects: |
      array:
        - |
          objectName: auth-db-connection-string
          objectType: secret
        - |
          objectName: auth-jwt-private-key
          objectType: secret
        - |
          objectName: redis-access-key
          objectType: secret
