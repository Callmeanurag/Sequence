apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: sequence-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: sequence-tls-cert  # TLS cert from cert-manager
      hosts:
        - "api.sequence.game"
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "api.sequence.game"
      tls:
        httpsRedirect: true  # Redirect all HTTP to HTTPS
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: sequence-routing
  namespace: sequence-prod
spec:
  hosts:
    - "api.sequence.game"
  gateways:
    - istio-system/sequence-gateway
  http:
    - match:
        - uri:
            prefix: "/api/v1/auth"
      route:
        - destination:
            host: auth-service
            port:
              number: 80
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: "5xx,reset,connect-failure,retriable-4xx"

    - match:
        - uri:
            prefix: "/api/v1/games"
      route:
        - destination:
            host: game-service
            port:
              number: 80
      timeout: 30s

    - match:
        - uri:
            prefix: "/ws/"
      route:
        - destination:
            host: game-service
            port:
              number: 8081
      timeout: 3600s  # Long timeout for WebSocket connections

    - match:
        - uri:
            prefix: "/api/v1/matchmaking"
      route:
        - destination:
            host: matchmaking-service
            port:
              number: 80

    - match:
        - uri:
            prefix: "/api/v1/leaderboard"
      route:
        - destination:
            host: leaderboard-service
            port:
              number: 80
      timeout: 5s
