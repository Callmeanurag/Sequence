# Prometheus Helm values
# Install: helm install prometheus prometheus-community/kube-prometheus-stack \
#            -n monitoring --create-namespace -f observability/prometheus/values.yaml

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "50GB"

    # Scrape all pods with prometheus.io/scrape: "true" annotation
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

    # Node affinity: schedule on infra node pool
    nodeSelector:
      workload: platform
    tolerations:
      - key: workload
        operator: Equal
        value: platform
        effect: NoSchedule

    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: managed-premium
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    additionalScrapeConfigs:
      - job_name: 'istio-mesh'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - istio-system
                - sequence-prod
                - sequence-staging
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      workload: platform
    tolerations:
      - key: workload
        operator: Equal
        value: platform
        effect: NoSchedule
  config:
    global:
      slack_api_url: ""  # Set via external secret
    route:
      receiver: slack-critical
      group_by: ['alertname', 'service']
      routes:
        - match:
            severity: critical
          receiver: slack-critical
          repeat_interval: 15m
        - match:
            severity: warning
          receiver: slack-warning
          repeat_interval: 4h
    receivers:
      - name: slack-critical
        slack_configs:
          - channel: '#alerts-critical'
            title: '{{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.runbook_url }}{{ end }}'
      - name: slack-warning
        slack_configs:
          - channel: '#alerts-warning'

grafana:
  enabled: true
  nodeSelector:
    workload: platform
  tolerations:
    - key: workload
      operator: Equal
      value: platform
      effect: NoSchedule
  persistence:
    enabled: true
    storageClassName: managed-premium
    size: 10Gi
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'sequence'
          folder: 'Sequence Platform'
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/sequence

kube-state-metrics:
  nodeSelector:
    workload: platform

node-exporter:
  tolerations:
    - operator: Exists  # Run on ALL nodes including system/infra pools
